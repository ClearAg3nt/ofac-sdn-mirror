name: Sync OFAC SDN Names

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily — runs before KYA Worker cron at 02:00 UTC
  workflow_dispatch:        # manual trigger via GitHub UI or API

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the updated JSON back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch SDN CSV (primary entities)
        run: |
          fetch_csv() {
            local url="$1" outfile="$2" label="$3"
            echo "Trying $label..."
            HTTP_STATUS=$(curl -sL -w "%{http_code}" \
              -A "Mozilla/5.0 (compatible; ofac-sdn-mirror/1.0; +https://github.com/ClearAg3nt/ofac-sdn-mirror)" \
              --max-time 60 -o "$outfile" "$url")
            echo "  HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ] || [ ! -s "$outfile" ]; then
              echo "  ❌ Failed (status $HTTP_STATUS or empty)"
              return 1
            fi
            # Reject HTML responses (error pages that return 200)
            if head -c 256 "$outfile" | grep -qi "<!doctype\|<html\|<head"; then
              echo "  ❌ Got HTML page instead of CSV — server is returning an error page"
              head -c 500 "$outfile"
              return 1
            fi
            echo "  ✓ Size: $(wc -c < "$outfile") bytes, $(wc -l < "$outfile") lines"
            head -1 "$outfile"
            return 0
          }
          fetch_csv \
            "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.CSV" \
            sdn.csv "OFAC API (primary)" \
          || fetch_csv \
            "https://www.treasury.gov/ofac/downloads/sdn.csv" \
            sdn.csv "treasury.gov (fallback)" \
          || { echo "❌ All SDN CSV sources failed"; exit 1; }

      - name: Fetch ALT CSV (aliases / AKAs)
        run: |
          fetch_csv() {
            local url="$1" outfile="$2" label="$3"
            echo "Trying $label..."
            HTTP_STATUS=$(curl -sL -w "%{http_code}" \
              -A "Mozilla/5.0 (compatible; ofac-sdn-mirror/1.0; +https://github.com/ClearAg3nt/ofac-sdn-mirror)" \
              --max-time 60 -o "$outfile" "$url")
            echo "  HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ] || [ ! -s "$outfile" ]; then
              echo "  ❌ Failed (status $HTTP_STATUS or empty)"
              return 1
            fi
            if head -c 256 "$outfile" | grep -qi "<!doctype\|<html\|<head"; then
              echo "  ❌ Got HTML page instead of CSV"
              head -c 500 "$outfile"
              return 1
            fi
            echo "  ✓ Size: $(wc -c < "$outfile") bytes, $(wc -l < "$outfile") lines"
            head -1 "$outfile"
            return 0
          }
          fetch_csv \
            "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/ALT.CSV" \
            alt.csv "OFAC API (primary)" \
          || fetch_csv \
            "https://www.treasury.gov/ofac/downloads/alt.csv" \
            alt.csv "treasury.gov (fallback)" \
          || { echo "❌ All ALT CSV sources failed"; exit 1; }

      - name: Parse and normalise names
        run: python3 parse_ofac.py

      - name: Sanity check
        run: |
          COUNT=$(python3 -c "import json; d=json.load(open('ofac_names.json')); print(len(d))")
          echo "Parsed $COUNT names"
          if [ "$COUNT" -lt 500 ]; then
            echo "❌ Sanity check failed — fewer than 500 names parsed"
            exit 1
          fi
          echo "✓ Sanity check passed"

      - name: Commit and push
        run: |
          git config user.name  "ofac-sdn-mirror[bot]"
          git config user.email "bot@clearagent.dev"
          git add ofac_names.json metadata.json
          if git diff --staged --quiet; then
            echo "No changes — SDN list unchanged since last sync"
          else
            git commit -m "sync: OFAC SDN names $(date -u +%Y-%m-%d)"
            git push
          fi
